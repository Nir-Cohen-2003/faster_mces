[workspace]
authors = ["Nir"]
channels = ["https://prefix.dev/conda-forge","https://prefix.dev/nir-cohen"]
name = "mces_splitting"
platforms = ["linux-64"]
preview = ["pixi-build"]
    
[package]
name = "mces_splitting"
version = "0.3.0"
authors = ["Nir"]
description = "MCES-based dataset splitting"

[tasks]
splitting_test = "python tests/splitting_test.py"
bounds_validity_test = "python tests/bounds_test.py"
publish-prefix = {cmd="rattler-build upload prefix --channel nir-cohen"}
publish-anaconda = {cmd="rattler-build upload anaconda --owner Nir_Cohen --channel main"}

[dependencies]
mces_splitting = { path = "." }
python = "3.12.*"
hrms_utils = ">=0.6.2"

[pypi-dependencies]
ipykernel = "*"


[package.build] 
backend = { name = "pixi-build-python", version = ">=0.3.2" }

[package.host-dependencies] 
python = "*"
pip = "*"
hatchling = "*"

[package.run-dependencies] 
fast_mces_lower_bound = ">=1.1.0"
rdkit = ">=2024.0.0"
polars = ">=1.32.0,<2"
numpy = ">=2.0.0,<2.3.0"
scipy = "*"
networkx = "*"
pulp = "*"
